- name: Create OMS - Stripe recon rule
  method: POST
  endpoint: /recon_rules
  payload:
    priority: 1
    rule_description: Reconciliation between OMS and Stripe
    rule_name: OMS <-> Stripe
    sources:
    - account_id: ${oms_account}
      trigger:
        field: metadata.psp_type
        operator:
          operator_version: v1
          value: equals
        trigger_version: v1
        value: Stripe
    targets:
    - account_id: ${stripe_account}
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
      search_identifier:
        search_version: v1
        source_field: order_id
        target_field: order_id
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
