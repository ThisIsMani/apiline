- name: Create OMS transformation 2
  method: POST
  endpoint: /transformations/v2/configs
  payload:
    account_id: ${oms_account}
    config:
      account_id: ${oms_account}
      merchant_id: ${merchant_id}
      parsing_config:
        file_format: csv
      profile_id: ${profile_id}
    ingestion_id: ${oms_manual_ingestion_id}
    is_active: true
    metadata_schema_data:
      fields:
        amount:
          identifier: amount
          unit_config: null
          unit_type: minor_unit
          validation_rules: []
        balance_direction:
          credit_values:
          - payment
          debit_values:
          - refund
          identifier: type
        currency:
          identifier: currency
        effective_at:
          date_time_format:
            date_format:
              delimiter: hyphen
              order: day_month_year
            time_format: null
          identifier: order_date
        metadata_fields:
        - description: Order ID from OMS
          field_name: metadata.order_id
          field_type: string
          identifier: order_id
          required: true
          transformation_rules: []
          validation_rules:
          - validation_rule_type: min_length
            value: 3
          - validation_rule_type: max_length
            value: 50
        - description: PSP Type from OMS
          field_name: metadata.psp_type
          field_type: string
          identifier: psp_type
          required: true
          transformation_rules: []
          validation_rules:
          - validation_rule_type: min_length
            value: 1
          - validation_rule_type: max_length
            value: 50
        order_id:
          identifier: order_id
          transformation_rules: []
      processing_mode: transaction
      schema_type: basic_schema_data
      unique_constraint:
        constraint_type:
          field_name: order_id
          unique_constraint_type: single_field
        description: Order ID must be unique across all transactions
    name: OMS Transactions
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
