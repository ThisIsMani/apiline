# Recon Rules
- name: Create Polisy -> GDPP recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 1
    rule_description: Reconciliation between Polisy entries and GDPP entries
    rule_name: Polisy <-> GDPP
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
        - operator: equals
          source_field: metadata.gdpp_status
          target_field: metadata.status
      one_to_one_type: single_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.transaction_id
        target_field: metadata.transaction_id
      source_account:
        account_id: ${polisy_account}
        trigger:
          conditions:
          - field: metadata.record_type
            operator:
              operator_version: v1
              value: equals
            value: '2'
          logic: all
          trigger_version: v2
      target_account:
        account_id: ${gdpp_account}
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null

- name: Create GDPP <-> Adyen Settlement recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 2
    rule_description: Reconciliation between GDPP payments/refunds and Adyen Settlement Detail Report
    rule_name: GDPP <-> Adyen Settlement
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: metadata.adyen_status
          target_field: metadata.settlement_type
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
      one_to_one_type: single_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.connector_reference_id
        target_field: metadata.connector_reference_id
      source_account:
        account_id: ${gdpp_account}
        trigger:
          conditions:
          - field: metadata.status
            operator:
              operator_version: v1
              value: equals
            value: charged
          - field: metadata.refund_status
            operator:
              operator_version: v1
              value: equals
            value: success
          logic: any
          trigger_version: v2
      target_account:
        account_id: ${adyen_settlement_account}
  files: null
  auth: jwt
  expected_status: 201
  save_as: gdpp_adyen_settlement_rule_id
  extract_path: $.rule_id
  save_multiple: null

- name: Create GDPP Payouts -> Adyen Balance Platform recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 3
    rule_description: Reconciliation between GDPP Payouts and Adyen Balance Platform Report
    rule_name: GDPP Payouts <-> Adyen Balance Platform
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: metadata.adyen_balance_platform_status
          target_field: metadata.status
        - operator: equals
          source_field: metadata.adyen_balance_platform_type
          target_field: metadata.type
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
      one_to_one_type: single_many
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.connector_payout_id
        target_field: metadata.transfer_id
      source_account:
        account_id: ${gdpp_account}
        trigger:
          field: metadata.status
          operator:
            operator_version: v1
            value: equals
          trigger_version: v1
          value: success
      target_account:
        account_id: ${adyen_balance_account}
  files: null
  auth: jwt
  expected_status: 201
  save_as: gdpp_payouts_adyen_balance_rule_id
  extract_path: $.rule_id
  save_multiple: null

- name: Create Adyen Settlement -> Balance Platform recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 4
    rule_description: Adyen Settlement rows grouped by creation-hour bucket should match to Balance Platform transactions with matching booking-hour bucket, amount, and currency
    rule_name: Adyen Settlement <-> Balance Platform
    strategy:
      match_rules:
        match_version: v1
        rules: []
      one_to_one_type: many_single
      recon_strategy_type: one_to_one
      search_identifier:
        delimiter: pipe
        keys:
        - source_field: metadata.merchant_account
          target_field: metadata.merchant_account
        - source_field: metadata.batch_number
          target_field: metadata.settlement_batch
        - source_field: metadata.truncated_creation_date
          target_field: metadata.settlement_booking_date
        search_v2_type: composite
        search_version: v2
      source_account:
        account_id: ${adyen_settlement_account}
        grouping_field:
          delimiter: pipe
          fields:
          - metadata.merchant_account
          - metadata.batch_number
          - metadata.truncated_creation_date
          grouping_field_v1_type: composite
          grouping_field_version: v1
        trigger:
          conditions:
          - field: metadata.type
            operator:
              operator_version: v1
              value: equals
            value: Settled
          - field: metadata.type
            operator:
              operator_version: v1
              value: equals
            value: Refunded
          logic: any
          trigger_version: v2
      target_account:
        account_id: ${adyen_balance_account}
  files: null
  auth: jwt
  expected_status: 201
  save_as: adyen_settlement_balance_rule_id
  extract_path: $.rule_id
  save_multiple: null

- name: Create Balance Platform -> Bank recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 5
    rule_description: Reconciliation between Balance Platform bankTransfer rows and Bank statement rows, matching on Amount, Currency, and Bank status
    rule_name: Balance Platform <-> Bank
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
      one_to_one_type: single_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.reference
        target_field: metadata.adyen_reference
      source_account:
        account_id: ${adyen_balance_account}
        trigger:
          conditions:
          - field: metadata.type
            operator:
              operator_version: v1
              value: equals
            value: bankTransfer
          - field: metadata.status
            operator:
              operator_version: v1
              value: equals
            value: booked
          logic: all
          trigger_version: v2
      target_account:
        account_id: ${bank_account}
  files: null
  auth: jwt
  expected_status: 201
  save_as: balance_platform_bank_rule_id
  extract_path: $.rule_id
  save_multiple: null

