# Transformations
# Polisy <> GDPP
- name: Create Polisy Payment transformation
  method: POST
  endpoint: /transformations/v2/configs
  payload:
    account_id: ${polisy_account}
    config:
      account_id: ${polisy_account}
      merchant_id: ${merchant_id}
      parsing_config:
        file_format: fixed_width
        fields:
        - header: Record Type
          index: 0
          width: 1
        - header: Transaction Date & Time
          index: 1
          width: 14
        - header: Transaction Date
          index: 1
          width: 8
        - header: Transaction Time
          index: 9
          width: 6
        - header: Account Number
          index: 15
          width: 7
        - header: Policy Number
          index: 22
          width: 10
        - header: Amount Paid
          index: 32
          width: 9
        - header: Sign
          index: 41
          width: 1
        - header: Pay Method
          index: 42
          width: 1
        - header: Name on Card
          index: 43
          width: 25
        - header: Original Transaction Date
          index: 68
          width: 8
        - header: Original Transaction Type
          index: 76
          width: 1
        - header: Transaction ID
          index: 77
          width: 26
      profile_id: ${profile_id}
      skip_configs:
      - conditions:
        - identifier: Record Type
          operator: not_equals
          skip_type: value_skip
          value: '2'
    ingestion_id: ${polisy_manual_ingestion_id}
    is_active: true
    metadata_schema_data:
      fields:
        amount:
          identifier: Amount Paid
          transformation_rules:
          - transformation_rule_type: trim
          - transformation_rule_type: absolute
          unit_type: minor_unit
          validation_rules:
          - validation_rule_type: positive_only
        balance_direction:
          credit_values:
          - +
          debit_values:
          - '-'
          identifier: Sign
          transformation_rules: []
        currency:
          identifier: currency
          transformation_rules:
          - transformation_rule_type: trim
          - currency: AUD
            transformation_rule_type: default_value
        effective_at:
          date_time_format:
            date_format:
              delimiter: none
              order: year_month_day
            time_format:
              order: twenty_four_hour_with_seconds
              delimiter: none
              separator_from_date: none
          identifier: Transaction Date & Time
          transformation_rules:
          - transformation_rule_type: trim
          post_parse_transformations:
          - post_parse_rule_type: subtract_duration
            duration:
              # Syden AEST Time Zone
              value: 10
              unit: hours
        order_id:
          identifier: Transaction ID
          transformation_rules:
          - transformation_rule_type: trim
        metadata_fields:
        - description: Record Type
          field_name: metadata.record_type
          field_type: string
          identifier: Record Type
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Transaction Date
          field_name: metadata.transaction_date
          field_type: string
          identifier: Transaction Date
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Transaction Time
          field_name: metadata.transaction_time
          field_type: string
          identifier: Transaction Time
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Account Number
          field_name: metadata.account_number
          field_type: string
          identifier: Account Number
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Policy Number
          field_name: metadata.policy_number
          field_type: string
          identifier: Policy Number
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Amount Paid
          field_name: metadata.amount_paid
          field_type: string
          identifier: Amount Paid
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Sign
          field_name: metadata.sign
          field_type: string
          identifier: Sign
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Pay Method
          field_name: metadata.pay_method
          field_type: string
          identifier: Pay Method
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Name on Card
          field_name: metadata.name_on_card
          field_type: string
          identifier: Name on Card
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Original Transaction Date
          field_name: metadata.original_transaction_date
          field_type: string
          identifier: Original Transaction Date
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Original Transaction Type
          field_name: metadata.original_transaction_type
          field_type: string
          identifier: Original Transaction Type
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Transaction ID
          field_name: metadata.transaction_id
          field_type: string
          identifier: Transaction ID
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Expected GDPP Status
          field_name: metadata.gdpp_status
          field_type: enum
          identifier: Record Type
          mappings:
            '2': charged
          required: true
          transformation_rules:
          - transformation_rule_type: trim
      processing_mode: transaction
      schema_type: basic_schema_data
      schema_version: basic_v1
      unique_constraint:
        constraint_type:
          field_name: metadata.transaction_id
          unique_constraint_type: single_field
        description: Transaction ID
    name: Polisy Payment Transformation
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null

