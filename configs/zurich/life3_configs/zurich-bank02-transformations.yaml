          validation_rules: []
        order_id:
          identifier: GDPP TRANS DESC
          transformation_rules:
          - transformation_rule_type: trim
      processing_mode: transaction
      schema_type: basic_schema_data
      schema_version: basic_v1
      unique_constraint:
        constraint_type:
          field_name: metadata.gdpp_trans_desc
          unique_constraint_type: single_field
