          - transformation_rule_type: trim
          validation_rules: []
        - description: GDPP MERC NUM
          field_name: metadata.gdpp_merc_num
          field_type: string
          identifier: GDPP MERC NUM
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: GDPP TRANS DESC
          expose: true
          field_name: metadata.gdpp_trans_desc
          field_type: string
          identifier: GDPP TRANS DESC
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: BATCH
