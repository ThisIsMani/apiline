- name: Update Life 3 Transformation
  method: PUT
  endpoint: /transformations/configs/${life3_transformation_id}
  payload:
    name: Life3 Transformation
    skip_configs:
      - conditions:
        - identifier: GDPP MERC NUM
          operator: not_equals
          skip_type: value_skip
          transformation_rules:
          - transformation_rule_type: trim
          value: pro_TreNEjXUsQHGmIhKumoF
        - identifier: GDPP MERC NUM
          operator: not_equals
          skip_type: value_skip
          transformation_rules:
          - transformation_rule_type: trim
          value: pro_l1mXyfyxAuRy891DpDCb
    metadata_schema_data:
      fields:
        amount:
          identifier: TRANSACTION AMOUNT
          transformation_rules:
          - transformation_rule_type: trim
          - transformation_rule_type: absolute
          unit_type: minor_unit
          validation_rules:
          - validation_rule_type: positive_only
        balance_direction:
          credit_values:
          - credit
          debit_values:
          - debit
          identifier: TRANSACTION AMOUNT
          transformation_rules:
          - otherwise: credit
            prefix: '-'
            then: debit
            transformation_rule_type: starts_with
        currency:
          identifier: currency
          transformation_rules:
          - transformation_rule_type: trim
          - currency: AUD
            transformation_rule_type: default_value
        effective_at:
          date_time_format:
            date_format:
              delimiter: none
              order: day_month_year
            time_format: null
          identifier: TRANSACTION DATE
          transformation_rules:
          - transformation_rule_type: trim
        metadata_fields:
        - description: TRANSACTION TYPE
          field_name: metadata.transaction_type
          field_type: string
          identifier: TRANSACTION TYPE
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: SEQUENCE
