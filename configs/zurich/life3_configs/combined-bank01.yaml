# Transformations

- name: Create Life3 Payment transformation
  method: POST
  endpoint: /transformations/v2/configs
  payload:
    account_id: ${life3_account}
    config:
      account_id: ${life3_account}
      merchant_id: ${merchant_id}
      parsing_config:
        file_format: csv
      profile_id: ${profile_id}
      skip_configs:
      - conditions:
        - identifier: GDPP MERC NUM
          operator: not_equals
          skip_type: value_skip
          value: pro_11Rf8SqofUHAA2PZD5TC
        - identifier: GDPP MERC NUM
          operator: not_equals
          skip_type: value_skip
          value: pro_rgUvPqW30Y1vAziqpDCQ
        - identifier: GDPP MERC NUM
          operator: not_equals
          skip_type: value_skip
          value: pro_RqNOYGa56KofQngh2u46
    ingestion_id: ${life3_manual_ingestion_id}
    is_active: true
    metadata_schema_data:
      fields:
        amount:
          identifier: TRANSACTION AMOUNT
          transformation_rules:
          - transformation_rule_type: trim
          unit_type: minor_unit
          validation_rules:
          - validation_rule_type: positive_only
        balance_direction:
          credit_values:
          - credit
          debit_values:
          - debit
          identifier: balance_direction
          transformation_rules:
          - transformation_rule_type: trim
          - direction: credit
            transformation_rule_type: default_value
        currency:
          identifier: currency
          transformation_rules:
          - transformation_rule_type: trim
          - currency: AUD
            transformation_rule_type: default_value
        effective_at:
          date_time_format:
            date_format:
              delimiter: none
              order: day_month_year
            time_format: null
          identifier: TRANSACTION DATE
          transformation_rules:
          - transformation_rule_type: trim
        metadata_fields:
        - description: TRANSACTION TYPE
          field_name: metadata.transaction_type
          field_type: string
          identifier: TRANSACTION TYPE
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: SEQUENCE
          field_name: metadata.sequence
          field_type: string
          identifier: SEQUENCE
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: MERC NUM OLD
          field_name: metadata.merc_num_old
          field_type: string
          identifier: MERC NUM OLD
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: DD NUM
          field_name: metadata.dd_num
          field_type: string
          identifier: DD NUM
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: CARD NUM
          field_name: metadata.card_num
          field_type: string
          identifier: CARD NUM
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: EXP DATE
          field_name: metadata.exp_date
          field_type: string
          identifier: EXP DATE
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: CARD TYPE
          field_name: metadata.card_type
          field_type: string
          identifier: CARD TYPE
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: FILL1
          field_name: metadata.fill1
          field_type: string
          identifier: FILL1
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: TOKEN
          field_name: metadata.token
          field_type: string
          identifier: TOKEN
          required: false
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: CUSTOMER-REF
          field_name: metadata.customer_ref
          field_type: string
          identifier: CUSTOMER-REF
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: GDPP MERC NUM
          field_name: metadata.gdpp_merc_num
          field_type: string
          identifier: GDPP MERC NUM
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: GDPP TRANS DESC
          field_name: metadata.gdpp_trans_desc
          field_type: string
          identifier: GDPP TRANS DESC
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: BATCH
          field_name: metadata.batch
          field_type: string
          identifier: BATCH
          required: true
          transformation_rules:
          - transformation_rule_type: trim
          validation_rules: []
        - description: Expected GDPP Status
          field_name: metadata.gdpp_status
          field_type: enum
          identifier: TRANSACTION TYPE
          mappings:
            '3': charged
          required: true
          transformation_rules:
          - transformation_rule_type: trim
        - description: Entry Type
          field_name: metadata.entry_type
          field_type: enum
          identifier: TRANSACTION TYPE
          mappings:
            '3': payment
          required: true
          transformation_rules:
          - transformation_rule_type: trim
        order_id:
          identifier: GDPP TRANS DESC
          transformation_rules:
          - transformation_rule_type: trim
      processing_mode: transaction
      schema_type: basic_schema_data
      schema_version: basic_v1
      unique_constraint:
        constraint_type:
          field_name: metadata.gdpp_trans_desc
          unique_constraint_type: single_field
        description: GDPP TRANS DESC
    name: Life3 Payment Transformation
  files: null
  auth: jwt
  expected_status: 201
  save_as: life3_transformation_id
  extract_path: $.transformation_id
  save_multiple: null

