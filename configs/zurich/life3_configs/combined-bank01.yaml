- name: Update Adyen Settlement -> Balance Platform recon rule
  method: PUT
  endpoint: /recon_rules/${adyen_settlement_balance_rule_id}
  payload:
    aging_config:
      aging_config_type: no_aging
    rule_description: Adyen Settlement rows grouped by creation-hour bucket should match to Balance Platform transactions with matching booking-hour bucket, amount, and currency
    rule_name: Adyen Settlement <-> Balance Platform
    priority: 4
    strategy:
      match_rules:
        match_version: v1
        rules: []
      one_to_one_type: many_single
      recon_strategy_type: one_to_one
      search_identifier:
        delimiter: pipe
        keys:
        - source_field: metadata.merchant_account
          target_field: metadata.merchant_account
        - source_field: metadata.batch_number
          target_field: metadata.settlement_batch
        - source_field: metadata.creation_date
          target_field: metadata.booking_date
        search_v2_type: composite
        search_version: v2
      source_account:
        account_id: ${adyen_settlement_account}
        grouping_field:
          delimiter: pipe
          fields:
          - metadata.merchant_account
          - metadata.batch_number
          - metadata.creation_date
          grouping_field_v1_type: composite
          grouping_field_version: v1
        trigger:
          conditions:
          - field: metadata.type
            operator:
              operator_version: v1
              value: equals
            value: Settled
          - field: metadata.type
            operator:
              operator_version: v1
              value: equals
            value: Refunded
          logic: any
          trigger_version: v2
      target_account:
        account_id: ${adyen_balance_account}
  files: null
  auth: jwt
  expected_status: 200
  save_as: null
  extract_path: null
  save_multiple: null

