# Rule Updates

- name: Update Life3 -> GDPP recon rule
  method: PUT
  endpoint: /recon_rules/${life3_gdpp_rule_id}
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 1
    rule_name: Life3 <-> GDPP
    rule_description: Reconciliation between Life3 transactions and GDPP processed transactions
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
        - operator: equals
          source_field: metadata.gdpp_status
          target_field: metadata.status
      one_to_one_type: single_single
      recon_strategy_type: one_to_one
