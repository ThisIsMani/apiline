# Recon Rules

- name: Create Life3 -> GDPP recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    aging_config:
      aging_config_type: no_aging
    priority: 1
    rule_description: Reconciliation between Life3 payments and GDPP processed payments
    rule_name: Life3 <-> GDPP
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
        - operator: equals
          source_field: metadata.gdpp_status
          target_field: metadata.status
      one_to_one_type: single_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.gdpp_trans_desc
        target_field: metadata.payment_id
      source_account:
        account_id: ${life3_account}
        trigger:
          field: metadata.entry_type
          operator:
            operator_version: v1
            value: equals
          trigger_version: v1
          value: payment
      target_account:
        account_id: ${gdpp_account}
  files: null
  auth: jwt
  expected_status: 201
  save_as: life3_gdpp_rule_id
  extract_path: $.rule_id
  save_multiple: null

