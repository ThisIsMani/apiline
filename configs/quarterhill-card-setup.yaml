- name: Create OMS - Stripe + Fee recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    priority: 1
    rule_description: Reconciliation between OMS and Stripe + Fee
    rule_name: OMS <-> Stripe + Fee
    strategy:
      one_to_many_type: single_single
      recon_strategy_type: one_to_many
      source_account:
        account_id: ${oms_account}
        trigger:
          field: metadata.psp_type
          operator:
            operator_version: v1
            value: equals
          trigger_version: v1
          value: Stripe
      target_accounts:
        split_type: percentage
        targets:
        - - account_id: ${stripe_account}
            match_rules:
              match_version: v1
              rules:
              - operator: equals
                source_field: amount
                target_field: amount
              - operator: equals
                source_field: currency
                target_field: currency
            search_identifier:
              search_version: v1
              source_field: order_id
              target_field: order_id
          - value: 95.0
        - - account_id: ${stripe_fee_account}
            match_rules:
              match_version: v1
              rules:
              - operator: equals
                source_field: amount
                target_field: amount
              - operator: equals
                source_field: currency
                target_field: currency
            search_identifier:
              search_version: v1
              source_field: order_id
              target_field: order_id
          - value: 5.0
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
- name: Create Stripe - Bank recon rule
  method: POST
  endpoint: /recon_rules/v2
  payload:
    priority: 2
    rule_description: Reconciliation between Stripe and Bank
    rule_name: Stripe <-> Bank
    strategy:
      match_rules:
        match_version: v1
        rules: []
      one_to_one_type: many_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.settlement_id
        target_field: order_id
      source_account:
        account_id: ${stripe_account}
        grouping_field: metadata.settlement_id
        trigger:
          field: currency
          operator:
            operator_version: v1
            value: equals
          trigger_version: v1
          value: USD
      target_account:
        account_id: ${bank_account}
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
