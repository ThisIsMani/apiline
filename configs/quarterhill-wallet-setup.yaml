- name: Wallet Recharge Transformation
  method: POST
  endpoint: /transformations/v2/configs
  payload:
    account_id: ${wallet_account}
    config:
      account_id: ${wallet_account}
      merchant_id: ${merchant_id}
      parsing_config:
        file_format: csv
      profile_id: ${profile_id}
    ingestion_id: ${wallet_ingestion_id}
    is_active: true
    metadata_schema_data:
      fields:
        amount:
          identifier: amount
          unit_type: minor_unit
          validation_rules: []
        balance_direction:
          credit_values:
          - credited
          debit_values:
          - debited
          identifier: status
        currency:
          identifier: currency
          validation_rules: []
        effective_at:
          date_time_format:
            date_format:
              delimiter: hyphen
              order: day_month_year
          identifier: recharge_date
        metadata_fields:
        - field_name: metadata.wallet_id
          description: Wallet ID from OMS
          field_type: string
          identifier: wallet_id
          required: true
          transformation_rules: []
          validation_rules: []
        - field_name: metadata.user_id
          description: User ID from OMS
          field_type: string
          identifier: user_id
          required: true
          transformation_rules: []
          validation_rules: []
        order_id:
          identifier: recharge_id
          transformation_rules: []
          validation_rules: []
      processing_mode: transaction
      unique_constraint:
        constraint_type:
          field_name: order_id
          unique_constraint_type: single_field
        description: Recharge id must be unique
      schema_type: basic_schema_data
    name: Wallet Recharges
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
- name: PSP Confirmation Transformation
