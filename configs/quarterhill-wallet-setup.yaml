requests:
- name: Bootstrap
  method: POST
  endpoint: /auth/bootstrap_with_ids
  payload:
    merchant_id: ${merchant_id}
    merchant_name: Aman Test
    profile_id: ${profile_id}
    profile_name: Aman Test 2
  auth: admin
  expected_status: 200
  save_as: null
  extract_path: null
  save_multiple: null
- name: Generate JWT token
  method: POST
  endpoint: /auth/generate_token
  payload:
    merchant_id: ${merchant_id}
    profile_id: ${profile_id}
