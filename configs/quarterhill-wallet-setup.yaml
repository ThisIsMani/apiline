- name: Create bank transformation
  method: POST
  endpoint: /transformations/v2/configs
  payload:
    account_id: ${bank_account}
    config:
      account_id: ${bank_account}
      merchant_id: ${merchant_id}
      parsing_config:
        file_format: csv
      profile_id: ${profile_id}
    ingestion_id: ${bank_ingestion_id}
    is_active: true
    metadata_schema_data:
      fields:
        amount:
          identifier: amount
          unit_type: minor_unit
          validation_rules: []
        balance_direction:
          credit_values:
          - credit
          debit_values:
          - debit
          identifier: type
        currency:
          identifier: currency
        effective_at:
          date_time_format:
            date_format:
              delimiter: hyphen
              order: day_month_year
            time_format: null
          identifier: settlement_date
        metadata_fields:
        - description: Batch Id from Bank
          field_name: metadata.batch_id
          field_type: string
          identifier: batch_id
          required: true
          transformation_rules: []
          validation_rules:
          - validation_rule_type: min_length
            value: 3
          - validation_rule_type: max_length
            value: 50
        order_id:
          identifier: batch_id
          transformation_rules: []
      processing_mode: confirmation
      schema_type: basic_schema_data
      unique_constraint:
        constraint_type:
          field_name: order_id
          unique_constraint_type: single_field
        description: Batch Id must be unique across all transactions
    name: Bank Statements
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
- name: Wallet → PSP Recon
  method: POST
  endpoint: /recon_rules/v2
  payload:
    priority: 1
    rule_description: Wallet recharge vs PSP confirmation
    rule_name: Wallet <-> PSP
    strategy:
      match_rules:
        match_version: v1
        rules:
        - operator: equals
          source_field: amount
          target_field: amount
        - operator: equals
          source_field: currency
          target_field: currency
      one_to_one_type: single_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: order_id
        target_field: order_id
      source_account:
        account_id: ${wallet_account}
        trigger:
          field: currency
          operator:
            operator_version: v1
            value: equals
          trigger_version: v1
          value: USD
      target_account:
        account_id: ${psp_account}
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
- name: PSP → Bank Recon
  method: POST
  endpoint: /recon_rules/v2
  payload:
    priority: 2
    rule_description: PSP settlement vs bank credit
    rule_name: PSP <-> Bank
    strategy:
      match_rules:
        match_version: v1
        rules: []
      one_to_one_type: many_single
      recon_strategy_type: one_to_one
      search_identifier:
        search_version: v1
        source_field: metadata.settlement_id
        target_field: order_id
      source_account:
        account_id: ${psp_account}
        grouping_field: metadata.settlement_id
        trigger:
          field: currency
          operator:
            operator_version: v1
            value: equals
          trigger_version: v1
          value: USD
      target_account:
        account_id: ${bank_account}
  auth: jwt
  expected_status: 201
  save_as: null
  extract_path: null
  save_multiple: null
