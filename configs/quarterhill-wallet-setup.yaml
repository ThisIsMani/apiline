  expected_status: 200
  save_as: jwt_token
  extract_path: $.token
  save_multiple: null
- name: Create Wallet Recharge Account
  method: POST
  endpoint: /accounts
  payload:
    account_name: Wallet Recharge Trigger
    account_type: credit
    currency: USD
    initial_balance: 0.0
  auth: jwt
  expected_status: 201
  save_as: wallet_account
  extract_path: $.account_id
  save_multiple: null
- name: Create PSP Account
  method: POST
  endpoint: /accounts
  payload:
    account_name: PSP
    account_type: debit
    currency: USD
    initial_balance: 0.0
  auth: jwt
  expected_status: 201
  save_as: psp_account
  extract_path: $.account_id
  save_multiple: null
- name: Create Bank Account
  method: POST
  endpoint: /accounts
  payload:
    account_name: Neutral Bank
    account_type: debit
    currency: USD
    initial_balance: 0.0
  auth: jwt
  expected_status: 201
  save_as: bank_account
  extract_path: $.account_id
  save_multiple: null
- name: Wallet Recharge Manual Ingestion
  method: POST
  endpoint: /ingestions/config
  payload:
    account_id: ${wallet_account}
    config:
      manual: null
    is_active: true
    merchant_id: ${merchant_id}
    name: Wallet Recharge Upload
    profile_id: ${profile_id}
  auth: admin
  expected_status: 201
  save_as: wallet_ingestion_id
  extract_path: $.ingestion_id
  save_multiple: null
- name: PSP Manual Ingestion
